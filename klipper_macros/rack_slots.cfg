; ==================================================================================================================
; OTTOBRIDGE — RACK SLOT MACROS
; Copy this file to your Klipper macros directory and include it in printer.cfg:
;   [include macros/rack_slots.cfg]
;
; These macros delegate to the OttoEject motion macros in ottoeject_macros.cfg
; Adjust STORE_TO_SLOT and GRAB_FROM_SLOT offsets in storage_calibration_variables.cfg
; ==================================================================================================================

; Slot 1 — bottom
[gcode_macro GRAB_FROM_SLOT_1]
description: Pick empty plate from Slot 1 (bottom)
gcode:
    M117 Grabbing plate from slot 1...
    _DO_SLOT_OPERATION SLOT_NUMBER=1 OPERATION_MACRO=_GRAB_FROM_SLOT X_UNCLAMP_OFFSET=0 Z_FLAT_OFFSET=0

[gcode_macro STORE_TO_SLOT_1]
description: Store plate into Slot 1 (bottom)
gcode:
    M117 Storing plate to slot 1...
    _DO_SLOT_OPERATION SLOT_NUMBER=1 OPERATION_MACRO=_STORE_TO_SLOT X_UNCLAMP_OFFSET=0 Z_FLAT_OFFSET=0

